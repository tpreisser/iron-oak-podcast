<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Hammer Tuner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F1114;color:#fff;font-family:system-ui;display:flex;height:100vh;overflow:hidden}
#controls{width:300px;padding:20px;background:#14161A;flex-shrink:0;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
h2{font-size:14px;color:#C8956C;margin-bottom:8px}
.row{margin-bottom:10px}
.row label{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:4px}
.row .v{color:#C8956C;font-family:monospace}
input[type=range]{width:100%;accent-color:#C8956C}
#canvas-area{flex:1;display:flex;min-width:0}
#text-side{width:42%;background:#181B20;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#text-side p{color:#444;font-size:13px;padding:30px;text-align:center}
#canvas-wrap{flex:1;position:relative;min-width:0}
canvas{width:100%;height:100%;display:block}
button{padding:10px;background:#C8956C;color:#000;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px}
#out{margin-top:8px;padding:8px;background:#111;border-radius:4px;font-family:monospace;font-size:10px;color:#aaa;white-space:pre-wrap}
.section-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;border-bottom:1px solid #222;padding-bottom:4px}
</style></head><body>

<div id="controls">
  <div>
    <div class="section-label">Strike 1</div>
    <h2>Strike 1</h2>
    <div class="row">
      <label><span>Starting point</span><span class="v" id="v1s">0.30</span></label>
      <input type="range" id="s1s" min="0.05" max="0.60" step="0.005" value="0.30">
    </div>
    <div class="row">
      <label><span>Hit point</span><span class="v" id="v1h">0.42</span></label>
      <input type="range" id="s1h" min="0.10" max="0.70" step="0.005" value="0.42">
    </div>
  </div>

  <div>
    <div class="section-label">Strike 2</div>
    <h2>Strike 2</h2>
    <div class="row">
      <label><span>Starting point</span><span class="v" id="v2s">0.52</span></label>
      <input type="range" id="s2s" min="0.20" max="0.80" step="0.005" value="0.52">
    </div>
    <div class="row">
      <label><span>Hit point</span><span class="v" id="v2h">0.65</span></label>
      <input type="range" id="s2h" min="0.25" max="0.90" step="0.005" value="0.65">
    </div>
  </div>

  <button onclick="copyVals()">Copy Values for Claude</button>
  <div id="out"></div>
</div>

<div id="canvas-area">
  <div id="text-side"><p>TEXT AREA<br>(42% — same as production)</p></div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const sparks = [];
let time = 0;

// Current progress — driven by whichever slider was last dragged
let currentProgress = 0.30;

function v(id) { return parseFloat(document.getElementById(id).value); }

// Wire up value displays and auto-progress
const displayMap = { s1s: 'v1s', s1h: 'v1h', s2s: 'v2s', s2h: 'v2h' };
document.querySelectorAll('input[type=range]').forEach(inp => {
  const displayEl = document.getElementById(displayMap[inp.id]);
  inp.addEventListener('input', () => {
    if (displayEl) displayEl.textContent = parseFloat(inp.value).toFixed(3);
    // Auto-set progress to whatever value you're dragging so you see that exact moment
    currentProgress = parseFloat(inp.value);
  });
});

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio, 2);
  C.width = r.width * dpr;
  C.height = r.height * dpr;
  C.style.width = r.width + 'px';
  C.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════════
// EASING FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function easeIn3(t) { return t * t * t; }
function easeOut3(t) { return 1 - Math.pow(1 - t, 3); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ═══════════════════════════════════════════════════════════════
// ANVIL — traced silhouette path from reference
// cx/cy = center of the anvil body, cy = top of face
// ═══════════════════════════════════════════════════════════════
function drawAnvil(cx, cy, sc, a) {
  if (a <= 0) return;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(-30, 125, 110, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Main silhouette path
  ctx.beginPath();
  ctx.moveTo(-180, 12);
  ctx.bezierCurveTo(-120, -4, -30, -6, 75, -2);
  ctx.bezierCurveTo(82, -1, 85, 8, 78, 22);
  ctx.bezierCurveTo(65, 42, 48, 55, 38, 72);
  ctx.bezierCurveTo(42, 78, 55, 82, 95, 85);
  ctx.lineTo(95, 115);
  ctx.bezierCurveTo(70, 115, 30, 80, 0, 78);
  ctx.bezierCurveTo(-30, 80, -70, 115, -95, 115);
  ctx.lineTo(-95, 85);
  ctx.bezierCurveTo(-55, 82, -42, 78, -38, 72);
  ctx.bezierCurveTo(-48, 55, -65, 42, -68, 22);
  ctx.bezierCurveTo(-72, 28, -130, 30, -180, 12);
  ctx.closePath();

  const g = ctx.createLinearGradient(-180, 0, 85, 0);
  g.addColorStop(0,    '#161618');
  g.addColorStop(0.35, '#454558');
  g.addColorStop(0.55, '#585868');
  g.addColorStop(0.90, '#2A2A38');
  g.addColorStop(1,    '#1A1A22');
  ctx.fillStyle = g;
  ctx.fill();

  // Face highlight strip along the top flat face
  ctx.beginPath();
  ctx.moveTo(-180, 12);
  ctx.bezierCurveTo(-120, -4, -30, -6, 75, -2);
  ctx.lineTo(75, 5);
  ctx.bezierCurveTo(-30, 2, -120, 4, -180, 12);
  ctx.closePath();
  const fg = ctx.createLinearGradient(-180, 0, 75, 0);
  fg.addColorStop(0,   'rgba(70,70,88,0)');
  fg.addColorStop(0.5, 'rgba(115,115,138,0.7)');
  fg.addColorStop(1,   'rgba(85,85,100,0.35)');
  ctx.fillStyle = fg;
  ctx.fill();

  // Specular top edge
  ctx.beginPath();
  ctx.moveTo(-170, 10);
  ctx.bezierCurveTo(-115, -5, -25, -7, 74, -3);
  ctx.strokeStyle = 'rgba(220,220,240,0.5)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Hardy hole (square) + pritchel hole (round) on the heel
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(46, 3, 10, 10);
  ctx.beginPath();
  ctx.arc(64, 8, 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// HAMMER — position-based keyframe system
//
// A pose is: { hx, hy, rot }
//   hx, hy  = world-space position of the hammer HEAD CENTER
//   rot     = rotation in degrees:
//             0   = handle points right (+X)
//             90  = handle points down (+Y)
//             180 = handle points left
//             270 = handle points up (-Y)
//
// Drawing: ctx.translate(hx,hy) → ctx.rotate(rot) → draw head at origin,
// handle extends in +X direction from the head center.
// ═══════════════════════════════════════════════════════════════
function drawHammerAtPose(hx, hy, rotDeg, a) {
  if (a <= 0) return;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.translate(hx, hy);
  ctx.rotate(rotDeg * Math.PI / 180);

  // Dimensions in local coords (handle extends in +X direction)
  const headW   = 58;   // head length along handle axis (X)
  const headH   = 82;   // head height perpendicular to handle (Y)
  const handleW = 15;
  const handleLen = 280;

  // === WOODEN HANDLE (extends in +X from right edge of head) ===
  const handleGrad = ctx.createLinearGradient(0, -handleW/2, 0, handleW/2);
  handleGrad.addColorStop(0,    '#3A2214');
  handleGrad.addColorStop(0.20, '#5C4530');
  handleGrad.addColorStop(0.45, '#6E5238');
  handleGrad.addColorStop(0.65, '#604A30');
  handleGrad.addColorStop(0.85, '#4A3320');
  handleGrad.addColorStop(1,    '#2C1A0C');

  ctx.beginPath();
  ctx.rect(headW / 2, -handleW / 2, handleLen, handleW);
  ctx.fillStyle = handleGrad;
  ctx.fill();

  // Wood grain lines
  ctx.save();
  ctx.beginPath();
  ctx.rect(headW / 2, -handleW / 2, handleLen, handleW);
  ctx.clip();
  for (let g = 0; g < 5; g++) {
    const t = (g + 0.5) / 5;
    const lineY = -handleW / 2 + handleW * t;
    ctx.beginPath();
    ctx.moveTo(headW / 2, lineY);
    ctx.lineTo(headW / 2 + handleLen, lineY);
    ctx.strokeStyle = g % 2 === 0 ? 'rgba(0,0,0,0.12)' : 'rgba(100,70,40,0.09)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  ctx.restore();

  // === IRON HAMMER HEAD (centered at origin) ===
  ctx.save();
  ctx.shadowBlur  = 18;
  ctx.shadowColor = 'rgba(0,0,0,0.55)';

  const headGrad = ctx.createLinearGradient(0, -headH/2, 0, headH/2);
  headGrad.addColorStop(0,    '#1E1E24');
  headGrad.addColorStop(0.12, '#32323C');
  headGrad.addColorStop(0.40, '#4A4A56');
  headGrad.addColorStop(0.58, '#525260');
  headGrad.addColorStop(0.80, '#3A3A44');
  headGrad.addColorStop(1,    '#1C1C22');

  ctx.beginPath();
  ctx.rect(-headW/2, -headH/2, headW, headH);
  ctx.fillStyle = headGrad;
  ctx.fill();
  ctx.restore();

  // Impact face strip — the striking face is at the -X end (left side of head)
  const faceDepth = 6;
  const faceGrad = ctx.createLinearGradient(0, -headH/2, 0, headH/2);
  faceGrad.addColorStop(0,   '#282830');
  faceGrad.addColorStop(0.5, '#565664');
  faceGrad.addColorStop(1,   '#262830');
  ctx.beginPath();
  ctx.rect(-headW/2, -headH/2, faceDepth, headH);
  ctx.fillStyle = faceGrad;
  ctx.fill();

  // Top-edge highlight on head
  ctx.beginPath();
  ctx.moveTo(-headW/2, -headH/2 + 2);
  ctx.lineTo( headW/2, -headH/2 + 2);
  ctx.strokeStyle = 'rgba(130,130,148,0.22)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// POSE INTERPOLATION
// ═══════════════════════════════════════════════════════════════
function lerpPose(a, b, t) {
  return {
    hx:  lerp(a.hx,  b.hx,  t),
    hy:  lerp(a.hy,  b.hy,  t),
    rot: lerp(a.rot, b.rot, t),
  };
}

// ═══════════════════════════════════════════════════════════════
// SPARKS + GLOW
// ═══════════════════════════════════════════════════════════════
function drawSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x  += s.vx;
    s.y  += s.vy;
    s.vy += 0.15;
    s.vx *= 0.97;
    s.life -= 0.024;
    if (s.life <= 0) { sparks.splice(i, 1); continue; }
    ctx.save();
    ctx.shadowBlur  = 7;
    ctx.shadowColor = `rgba(255,180,40,${s.life * 0.55})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,${Math.round(180 + s.b * 75)},${Math.round(40 + s.b * 55)},${s.life * 0.92})`;
    ctx.fill();
    if (s.life > 0.38) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 0.28 * s.life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,210,${(s.life - 0.38) * 1.6})`;
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawGlow(cx, cy, amt) {
  if (amt <= 0) return;
  ctx.save();
  const r1 = 90 * amt;
  const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r1);
  g1.addColorStop(0, `rgba(255,160,20,${0.4 * amt})`);
  g1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r1, r1 * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  const r2 = 30 * amt;
  const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r2);
  g2.addColorStop(0, `rgba(255,255,210,${0.98 * amt})`);
  g2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r2, r2 * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER — position-based keyframe system
// ═══════════════════════════════════════════════════════════════
function render() {
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  time++;

  const progress = currentProgress;

  // Strike timing from sliders
  const s1start = v('s1s');
  const s1hit   = v('s1h');
  const s2start = v('s2s');
  const s2hit   = v('s2h');

  // Lift timing (auto-calculated)
  const l1dur = 0.10;
  const l2dur = 0.15;
  const l1at = s1hit;
  const l2at = s2hit;

  // ── Anvil layout ──────────────────────────────────────────────
  const anvilCX   = w * 0.62;
  const anvilTopY = h * 0.50;
  const anvilScale = 0.88;

  // Impact point on the anvil face — this is where headX, headY lands at Impact pose
  // The anvil silhouette's face runs along y=0 in local coords (after translate to anvilCX, anvilTopY)
  // The face spans roughly x=-180 to x=75, and the impact point should be to the left of center
  const impactX = anvilCX - 20;    // slightly left of the anvil body center
  const impactY = anvilTopY - 2;   // right on the anvil face surface

  // ── Define the three key poses ────────────────────────────────
  // Raised/Cocked: hammer is up and to the right, handle angled so it would naturally
  // swing DOWN-LEFT to strike. Head is upper-right of anvil face.
  //   rot=225: handle points upper-right (225° = southwest direction means handle goes SW,
  //   so head is at origin and handle extends SW... we want handle to extend upper-right.
  //   rot=45: handle points lower-right (down-right). Impact face (at -X end) faces upper-left.
  //   Actually: rot=225 means the +X axis (handle direction) points toward lower-right (225 from +X is SW)
  //   Let me think: 0°=handle right, 90°=handle down, 180°=handle left, 270°=handle up
  //   For Raised: we want handle going UP-RIGHT and head below. That means rot ≈ -45° or 315°.
  //   Handle goes to upper-right, impact face (-X end) faces upper-left/left.
  //   For Impact: handle extends to the right, impact face faces left (toward anvil). rot ≈ 180°.
  //   But we want the impact face (at -X end of head) to contact the anvil...
  //   Impact face is at -headW/2 in X. When rot=180°, the -X end points RIGHT in world space.
  //   We need the impact face to point DOWN toward the anvil.
  //   rot=90°: handle extends downward (+Y), impact face (-X) faces LEFT.
  //   rot=0°: handle goes right, impact face faces left.
  //
  //   Let me reconsider the coordinate system:
  //   After ctx.translate(hx, hy) + ctx.rotate(rotDeg * PI/180):
  //   - Head rectangle: rect(-headW/2, -headH/2, headW, headH) — centered at origin
  //   - Impact face strip: rect(-headW/2, -headH/2, faceDepth, headH) — at the LEFT end
  //   - Handle: rect(headW/2, -handleW/2, handleLen, handleW) — extends to the RIGHT
  //
  //   So the impact face is at the LEFT end of the head in local space.
  //   In world space, after rotation rotDeg:
  //   - rot=0: impact face points LEFT, handle points RIGHT
  //   - rot=90: impact face points UP, handle points DOWN
  //   - rot=180: impact face points RIGHT, handle points LEFT
  //   - rot=270: impact face points DOWN, handle points UP
  //
  //   For impact: the face should point DOWNWARD toward the anvil → rot ≈ 270° (or -90°)
  //   Actually: if impact face (-X direction) should point DOWN, we need the local -X to map to world DOWN (+Y).
  //   Rotate local -X to world +Y: rotation of -90° (or 270°).
  //   So rot=270: local +X (handle) points LEFT in world, local -X (impact face) points RIGHT... no.
  //
  //   Let's be precise. After rotation by angle θ:
  //   world_X = local_X * cos(θ) - local_Y * sin(θ)
  //   world_Y = local_X * sin(θ) + local_Y * cos(θ)
  //
  //   We want local -X to point toward world +Y (downward onto anvil).
  //   local direction (-1, 0) in world: (-cos θ, -sin θ)
  //   Want: -cos θ = 0, -sin θ = 1 → cos θ = 0, sin θ = -1 → θ = -90° or 270°
  //
  //   So rot=270 (or -90): impact face points down, handle points up-left.
  //   That's the classic overhead hammer position.
  //
  //   For Raised/Cocked: hammer is held high, tilted. The handle goes upper-right,
  //   impact face points down-left (toward anvil, since anvil is lower-left of the raised position).
  //   We want local -X to point lower-left: direction (-0.7, 0.7) roughly.
  //   (-cos θ, -sin θ) = (-0.7, 0.7) → cos θ = 0.7, sin θ = -0.7 → θ ≈ -45° or 315°.
  //   rot=315: impact face points lower-left (toward anvil), handle points upper-right. ✓
  //
  //   For Impact: the face should touch the anvil face which is horizontal.
  //   At impact, the hammer comes from upper-right and hits the flat face.
  //   A realistic striking pose: handle angled slightly (like an arm following through).
  //   Impact face needs to be roughly parallel to anvil face (horizontal) and pointing down.
  //   rot=270: face points straight down (perpendicular to anvil face). ✓
  //   With some follow-through: maybe rot=250 (slightly past vertical, arm extended forward-down).
  //
  //   For Bounce: after impact, hammer bounces slightly. Face lifts off, tilts back.
  //   rot=280-290, head slightly above impact.
  //
  //   Head positions:
  //   Raised: head is upper-right of anvil.
  //     hx = impactX + 120,  hy = impactY - 200  (start well above and to the right)
  //   Impact: head ON the anvil face. BUT: the impact face is at -X end of head.
  //     At rot=270, local -X points DOWN in world. So the bottom of the head (in world) IS the impact face.
  //     The head center (hx,hy) needs to be above the actual contact point.
  //     Head height (headH=82) is the dimension perpendicular to handle.
  //     Wait, at rot=270: local Y axis points RIGHT in world. So headH (the perpendicular size, 82px)
  //     goes LEFT-RIGHT in world. headW (58px, along handle) goes UP-DOWN in world.
  //     The impact face (-X end, i.e. bottom of head when rot=270) is headW/2 = 29px below center.
  //     So head center must be 29px ABOVE the anvil face: hx=impactX, hy=impactY - 29.
  //     But let's use a slightly different approach for visual correctness...
  //     At rot=270, the hammer head occupies:
  //       X: hx - headH/2 to hx + headH/2  (since headH is now horizontal)
  //       Y: hy - headW/2 to hy + headW/2  (since headW is now vertical)
  //     The impact face is the strip at -headW/2 (top of the local head), which at rot=270
  //     is at the BOTTOM of the world head: hy + headW/2 = hy + 29.
  //     So for the impact face to touch impactY: hy + 29 = impactY → hy = impactY - 29.
  //     ... this is getting complex. Let me use a simpler approximation:
  //     just place the head center so it LOOKS right visually.

  const RAISED = {
    hx:  impactX + 110,
    hy:  impactY - 195,
    rot: 315,   // handle points upper-right, impact face points lower-left
  };

  const IMPACT = {
    hx:  impactX,
    hy:  impactY - 28,  // head center above face; impact face (-X local, = bottom at rot=270) touches face
    rot: 270,   // impact face points straight down onto anvil face
  };

  const BOUNCE = {
    hx:  impactX + 18,
    hy:  impactY - 65,
    rot: 285,   // slightly past vertical, bouncing up
  };

  // ── Anvil alpha ────────────────────────────────────────────────
  const anvilAlpha = progress < 0.15
    ? progress / 0.15
    : progress > 0.85
      ? Math.max(0, 1 - (progress - 0.85) / 0.15)
      : 1;

  drawAnvil(anvilCX, anvilTopY, anvilScale, Math.max(0, anvilAlpha));

  // ── Hammer pose calculation ────────────────────────────────────
  const APPEAR_START = 0.15;
  const APPEAR_END   = s1start;   // hammer finishes entering just as strike 1 starts

  let pose = null;
  let hammerAlpha = 0;

  if (progress < APPEAR_START) {
    // Hammer not visible
    hammerAlpha = 0;
  } else if (progress < APPEAR_END) {
    // Fade in from off-screen to Raised position
    const t = (progress - APPEAR_START) / Math.max(0.001, APPEAR_END - APPEAR_START);
    const eased = easeOut3(t);
    // Start from a raised/further-back position and settle to RAISED
    const OFFSCREEN = {
      hx:  RAISED.hx + 80,
      hy:  RAISED.hy - 60,
      rot: RAISED.rot - 25,
    };
    pose = lerpPose(OFFSCREEN, RAISED, eased);
    hammerAlpha = Math.min(1, t * 3);  // fade in quickly
  } else if (progress < s1hit) {
    // Strike 1: RAISED → IMPACT with ease-in (acceleration)
    const t = (progress - s1start) / Math.max(0.001, s1hit - s1start);
    const eased = easeIn3(t);
    pose = lerpPose(RAISED, IMPACT, eased);
    hammerAlpha = 1;
  } else if (progress < s2start) {
    // Between strike 1 hit and strike 2 start: IMPACT → BOUNCE → RAISED
    const segDur = s2start - s1hit;
    const t = (progress - s1hit) / Math.max(0.001, segDur);
    if (t < 0.35) {
      // IMPACT → BOUNCE (fast bounce up, ease-out)
      const t2 = easeOut3(t / 0.35);
      pose = lerpPose(IMPACT, BOUNCE, t2);
    } else {
      // BOUNCE → RAISED (swing back up, ease-in then ease-out)
      const t2 = easeOut3((t - 0.35) / 0.65);
      pose = lerpPose(BOUNCE, RAISED, t2);
    }
    hammerAlpha = 1;
  } else if (progress < s2hit) {
    // Strike 2: RAISED → IMPACT with ease-in (harder strike)
    const t = (progress - s2start) / Math.max(0.001, s2hit - s2start);
    const eased = easeIn3(t);
    pose = lerpPose(RAISED, IMPACT, eased);
    hammerAlpha = 1;
  } else if (progress < 0.85) {
    // After strike 2: IMPACT → BOUNCE → hold RAISED (then fade)
    const segDur = 0.85 - s2hit;
    const t = (progress - s2hit) / Math.max(0.001, segDur);
    if (t < 0.25) {
      const t2 = easeOut3(t / 0.25);
      pose = lerpPose(IMPACT, BOUNCE, t2);
    } else {
      const t2 = easeOut3((t - 0.25) / 0.75);
      pose = lerpPose(BOUNCE, RAISED, t2);
    }
    hammerAlpha = 1;
  } else {
    // Fade out while at raised position
    pose = RAISED;
    hammerAlpha = Math.max(0, 1 - (progress - 0.85) / 0.15);
  }

  // ── Glow & sparks at impact moments ─────────────────────────────
  // Strike 1 glow: active when progress is between s1hit and l1at+l1dur
  const l1end = l1at + l1dur;
  const l2end = l2at + l2dur;

  let glowAmt = 0;

  // Strike 1 glow: peaks at s1hit, decays through l1dur
  if (progress >= s1hit && progress < l1end) {
    const t = (progress - s1hit) / Math.max(0.001, l1dur);
    glowAmt = Math.max(0, 1 - t * 2.2);
  }

  // Strike 2 glow (brighter): peaks at s2hit, decays through l2dur
  if (progress >= s2hit && progress < l2end) {
    const t = (progress - s2hit) / Math.max(0.001, l2dur);
    const g2 = Math.max(0, 1 - t * 2.0) * 1.25;
    glowAmt = Math.max(glowAmt, g2);
  }

  glowAmt = Math.min(1, glowAmt) * Math.max(0, anvilAlpha);

  drawGlow(impactX, impactY + 2, glowAmt);

  // Spawning sparks when striking
  const isStriking1 = progress > s1hit && progress < (s1hit + l1dur * 0.45);
  const isStriking2 = progress > s2hit && progress < (s2hit + l2dur * 0.50);
  if ((isStriking1 || isStriking2) && time % 2 === 0) {
    const n = isStriking2 ? 9 : 6;
    for (let i = 0; i < n; i++) {
      const ang = (Math.random() * Math.PI * 1.6) - Math.PI * 1.3;
      const sp  = 3 + Math.random() * 6;
      sparks.push({
        x: impactX + (Math.random() - 0.5) * 14,
        y: impactY - 2,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 3,
        life: 0.6 + Math.random() * 0.5,
        size: 1.4 + Math.random() * 3,
        b: 0.55 + Math.random() * 0.45,
      });
    }
  }
  if (glowAmt > 0.18 && time % 3 === 0) {
    sparks.push({
      x: impactX + (Math.random() - 0.5) * 22,
      y: impactY - 3,
      vx: (Math.random() - 0.5) * 2.5,
      vy: -(1.8 + Math.random() * 2.8),
      life: 0.4 + Math.random() * 0.32,
      size: 0.9 + Math.random() * 1.8,
      b: 0.5 + Math.random() * 0.38,
    });
  }
  drawSparks();

  // ── Draw hammer ──────────────────────────────────────────────
  if (pose && hammerAlpha > 0) {
    drawHammerAtPose(pose.hx, pose.hy, pose.rot, hammerAlpha);
  }

  // Impact point reference marker (small dot)
  ctx.beginPath();
  ctx.arc(impactX, impactY, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,0,0.35)';
  ctx.fill();

  requestAnimationFrame(render);
}

function copyVals() {
  const txt = `Strike 1: start=${v('s1s')}, hit=${v('s1h')}
Strike 2: start=${v('s2s')}, hit=${v('s2h')}`;
  navigator.clipboard.writeText(txt).then(() => {});
  document.getElementById('out').textContent = 'Copied!\n\n' + txt;
}

render();
</script>
</body></html>
